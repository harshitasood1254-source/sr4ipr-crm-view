services:
  - type: web
    name: sr4ipr-crm-view
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: sr4ipr-postgres
          property: connectionString

databases:
  - name: sr4ipr-postgres
    plan: free
    databaseName: sr4ipr_crm
    user: sr4ipr
